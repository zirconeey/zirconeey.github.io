<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zircon 知识库控制台 V8.0</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<style>
:root{--bg:#fafaf9;--bg2:#f0efeb;--bg3:#e8e7e3;--ink:#1a1a2e;--text:#374151;--muted:#6b7280;--light:#9ca3af;--border:#d5d4cf;--accent:#1e3a5f;--green:#16a34a;--red:#dc2626;--gold:#c9a96e;--font:'Source Sans 3',-apple-system,'PingFang SC',sans-serif;--mono:'JetBrains Mono','Fira Code','Consolas',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
button{font-family:var(--font);cursor:pointer}
.topbar{background:var(--ink);color:#e8e6e3;padding:.6rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:1rem;font-weight:500}
.tabs{display:flex}
.tab{padding:.45rem 1.2rem;font-size:.85rem;color:#8a8680;background:none;border:none;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:#e8e6e3}
.tab.active{color:#e8e6e3;border-bottom-color:var(--gold)}
.panel{display:none!important;flex:1;overflow:hidden}
.panel.active{display:flex!important}
.sidebar{width:320px;min-width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0}
.sidebar-header{padding:.8rem 1rem;font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sidebar-header button{font-size:.75rem;background:none;border:1px solid var(--border);padding:.2rem .6rem;border-radius:4px;color:var(--muted); margin-left:4px;}
.sidebar-header button:hover{border-color:var(--accent);color:var(--accent);background:white;}
.file-tree{flex:1;overflow-y:auto;padding:.5rem 0}
.main-cat-item{padding:.5rem 1rem;font-size:.9rem;font-weight:700;color:var(--accent);cursor:pointer;user-select:none;display:flex;align-items:center;gap:.4rem; border-top:1px solid var(--border); background:var(--bg3);}
.main-cat-item:first-child{border-top:none;}
.main-cat-item .arrow{font-size:.65rem;color:var(--muted);transition:transform .15s;display:inline-block;width:12px}
.main-cat-item .arrow.open{transform:rotate(90deg)}
.main-children{display:none}
.main-children.open{display:block}
.folder-item{padding:.4rem 1rem .4rem 2rem;font-size:.85rem;font-weight:600;color:var(--ink);cursor:pointer;user-select:none;display:flex;align-items:center;gap:.4rem}
.folder-item:hover{background:var(--bg3)}
.folder-item .arrow{font-size:.65rem;color:var(--muted);transition:transform .15s;display:inline-block;width:12px}
.folder-item .arrow.open{transform:rotate(90deg)}
.folder-children{display:none}
.folder-children.open{display:block}
.file-item{padding:.35rem 1rem .35rem 3.2rem;font-size:.84rem;color:var(--text);cursor:pointer;user-select:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-item:hover{background:var(--bg3)}
.file-item.selected{background:#dbeafe;color:var(--accent);font-weight:500}
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.editor-toolbar{padding:.6rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);flex-shrink:0}
.filename{font-size:.9rem;color:var(--muted); font-family:var(--mono); display:flex; align-items:center; gap:0.5rem;}
.btn-icon {background:none; border:none; font-size:1rem; cursor:pointer; opacity:0.6; transition:opacity 0.2s;}
.btn-icon:hover {opacity:1;}
.btn-save{background:var(--green);color:#fff;border:none;padding:.5rem 1.5rem;border-radius:6px;font-size:.85rem;font-weight:500;transition:background .2s}
.btn-save:hover{background:#15803d}
.yaml-form{padding:.8rem 1.2rem;border-bottom:1px solid var(--border);display:grid;grid-template-columns:auto 1fr auto 1fr auto 1fr auto 1fr;gap:.4rem .6rem;align-items:center;background:var(--bg2);flex-shrink:0}
.yaml-form label{font-size:.78rem;color:var(--muted);text-align:right;font-weight:500}
.yaml-form input,.yaml-form select{font-family:var(--mono);font-size:.82rem;padding:.3rem .5rem;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--text);outline:none; width:100%;}
.yaml-form input:focus,.yaml-form select:focus{border-color:var(--accent)}
.yaml-form .full{grid-column:2/-1}
.yaml-form .half{grid-column: span 3}
.input-with-btn {display:flex; gap:0.5rem;}
.input-with-btn input {flex:1;}
.input-with-btn button {background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:0 0.5rem; font-size:0.8rem; color:var(--text);}
.input-with-btn button:hover {background:#d1d5db;}
.cm-wrapper{flex:1;overflow:hidden}
.cm-wrapper .CodeMirror{height:100%;font-size:14px;line-height:1.6}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:var(--light);font-size:1.1rem}
.courses-page{flex:1;overflow-y:auto;padding:1.5rem 2rem}
.courses-inner{max-width:700px;margin:0 auto}
.courses-topbar{display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg);padding:.6rem 0 1rem;z-index:10}
.courses-topbar h2{font-size:1rem;color:var(--ink);margin:0}
.courses-topbar .btns{display:flex;gap:.6rem}
.btn-outline{background:none;border:1px solid var(--accent);color:var(--accent);padding:.4rem 1rem;border-radius:6px;font-size:.82rem}
.btn-outline:hover{background:var(--accent);color:#fff}
.disc-group{margin-bottom:1rem;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.disc-header{padding:.55rem 1rem;background:var(--bg2);font-size:.85rem;font-weight:600;color:var(--ink);cursor:grab;user-select:none;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid var(--border)}
.disc-header:active{cursor:grabbing}
.disc-arrow{font-size:.6rem;color:var(--muted);transition:transform .2s;display:inline-block;cursor:pointer}
.disc-arrow.open{transform:rotate(90deg)}
.disc-label{flex:1;cursor:pointer}
.disc-count{font-size:.75rem;color:var(--light);font-weight:400}
.disc-body{display:none}
.disc-body.open{display:block}
.course-item{padding:.55rem 1rem .55rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.8rem;cursor:grab;font-size:.9rem;transition:background .1s}
.course-item:last-child{border-bottom:none}
.course-item:hover{background:#f0f9ff}
.course-item:active{cursor:grabbing}
.course-name{flex:1;color:var(--ink)}
.course-folder{font-size:.75rem;color:var(--light);font-family:var(--mono)}
.sortable-ghost{opacity:.4;background:#dbeafe}
.toast{position:fixed;bottom:2rem;right:2rem;padding:.8rem 1.5rem;background:var(--ink);color:#fff;border-radius:8px;font-size:.88rem;opacity:0;transform:translateY(10px);transition:all .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}

.modal-overlay {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;}
.modal-box {background:white; padding:2rem; border-radius:8px; width:450px; box-shadow:0 10px 25px rgba(0,0,0,0.1);}
.modal-box h3 {margin-bottom:1.5rem; color:var(--ink); text-align:center; border-bottom:1px solid var(--border); padding-bottom:0.8rem;}
.modal-box label {display:block; margin:0.8rem 0 0.3rem; font-size:0.85rem; font-weight:600; color:var(--text);}
.modal-box .hint {font-size:0.75rem; color:var(--muted); font-weight:normal; margin-left:0.4rem;}
.modal-box input, .modal-box select {width:100%; padding:0.6rem; border:1px solid var(--border); border-radius:4px; font-family:var(--mono); margin-bottom:0.5rem;}
.modal-box input:focus, .modal-box select:focus {border-color:var(--accent); outline:none;}
.modal-btns {margin-top:1.5rem; text-align:right;}
.modal-btns button {padding:0.5rem 1.2rem; border-radius:4px; border:none; margin-left:0.5rem; font-weight:600;}
.btn-cancel {background:#e5e7eb; color:var(--text);}
.btn-cancel:hover {background:#d1d5db;}
</style>
</head>
<body>

<div class="topbar">
  <h1>Zircon 知识库控制台 V8.0</h1>
  <div class="tabs">
    <button class="tab active" data-tab="notes" onclick="switchTab('notes')">全站内容管理</button>
    <button class="tab" data-tab="courses" onclick="switchTab('courses')">课程专项排序</button>
  </div>
</div>

<div id="panel-notes" class="panel active">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>数字花园树</span>
      <div>
        <button onclick="openModal()">➕ 新建</button>
        <button onclick="loadTree()">刷新</button>
      </div>
    </div>
    <div class="file-tree" id="file-tree"></div>
  </div>
  <div class="editor-area">
    <div class="empty-state" id="empty-state">← 从左侧选择一篇文章，或点击“新建”</div>
    <div id="editor-content" style="display:none;flex-direction:column;overflow:hidden;flex:1">
      <div class="editor-toolbar">
        <div class="filename">
            <span id="current-filename">—</span>
            <button class="btn-icon" onclick="renameFile()" title="重命名文件">✏️</button>
            <button class="btn-icon" onclick="deleteFile()" title="彻底删除文件" style="color:var(--red)">🗑️</button>
        </div>
        <button class="btn-save" onclick="saveNote()">💾 保存 <span style="font-size:.72rem;color:rgba(255,255,255,.7);margin-left:.3rem">⌘S</span></button>
      </div>
      
      <div class="yaml-form">
        <label>title</label><input id="f-title" class="half" type="text">
        <label>main_category</label><select id="f-main_category"><option value="课程资料">课程资料</option><option value="科研妙招">科研妙招</option><option value="生活攻略">生活攻略</option><option value="随笔漫谈">随笔漫谈</option></select>
        <label>published</label><select id="f-published"><option value="true">true</option><option value="false">false</option></select>
        
        <label>sub_category</label><input id="f-sub_category" type="text" placeholder="非课程类专用">
        <label>course</label><input id="f-course" type="text" placeholder="课程资料专用">
        <label>discipline</label><input id="f-discipline" type="text" placeholder="课程资料专用">
        <label>material_type</label><select id="f-material_type"><option value="">—</option><option>Notes</option><option>Exams</option><option>Script</option><option>Tool</option><option>Life</option></select>
        
        <label>date</label><input id="f-date" type="text">
        <label>author</label><input id="f-author" type="text">
        <label>permalink</label><input id="f-permalink" class="half" type="text">
        
        <label>pdf_url</label>
        <div class="full input-with-btn">
            <input id="f-pdf_url" type="text" placeholder="留空则无附件">
            <button onclick="syncPdfUrl()" title="根据 permalink 自动生成">🪄 同步链接</button>
        </div>
      </div>
      <div class="cm-wrapper"><textarea id="md-editor"></textarea></div>
    </div>
  </div>
</div>

<div id="panel-courses" class="panel">
  <div class="courses-page">
    <div class="courses-inner">
      <div class="courses-topbar">
        <h2>拖拽调整【课程资料】分类顺序</h2>
        <div class="btns">
          <button class="btn-outline" onclick="scanCourses()">自动导入新课程</button>
          <button class="btn-save" onclick="saveCourses()">💾 保存排序</button>
        </div>
      </div>
      <div id="disc-list"></div>
    </div>
  </div>
</div>

<datalist id="existing-courses"></datalist>

<div id="modal-new" class="modal-overlay">
  <div class="modal-box">
    <h3>➕ 新增内容</h3>
    
    <label>1. 选择所属大板块</label>
    <select id="new-main-cat" onchange="toggleModalFields(); autoGenLinks();">
        <option value="courses">🎒 课程资料 (Course Materials)</option>
        <option value="research">🔬 科研妙招 (Research Hacks)</option>
        <option value="life">☕ 生活攻略 (Life Guides)</option>
        <option value="essays">✒️ 随笔漫谈 (Essays & Musings)</option>
    </select>
    
    <label>2. 文章标题 <span class="hint">如: 宏观期中复习 / 纽约买菜指南</span></label>
    <input type="text" id="new-title" placeholder="输入文章的中文标题">
    
    <label id="lbl-subfolder">3. 所属课程 (英文缩写) <span class="hint">生成文件夹</span></label>
    <input type="text" id="new-folder" list="existing-courses" placeholder="如: corp-fin / latex" oninput="autoGenLinks()">
    
    <label>4. 网址英文缩写 <span class="hint">生成文件名与 Permalink</span></label>
    <input type="text" id="new-filename" placeholder="如: mid-prep" oninput="autoGenLinks()">
    
    <div style="margin-top:1rem; padding:0.8rem; background:var(--bg2); border-radius:6px; border:1px solid var(--border);">
        <label style="margin-top:0;">🔗 自动生成的网址预览</label>
        <input type="text" id="new-permalink" style="color:var(--accent); background:transparent; border:none; padding:0;" readonly>
        
        <div id="pdf-check-container" style="display:flex; align-items:center; gap:0.5rem; margin-top:0.8rem;">
            <input type="checkbox" id="new-has-pdf" style="width:auto; margin:0;" onchange="autoGenLinks()">
            <span style="font-size:0.85rem; color:var(--text); font-weight:600;">为本文生成并附带 PDF 讲义下载模块</span>
        </div>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="createNewNote()">🚀 确认创建</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script>
let currentFile=null, cleanInfo={}, cleanBody="", editor=null, initialSnap="", allKnownFolders={};

window.addEventListener('DOMContentLoaded', ()=>{
  try {
      if (typeof CodeMirror !== 'undefined') {
          editor=CodeMirror.fromTextArea(document.getElementById('md-editor'),{mode:'markdown',lineNumbers:true,lineWrapping:true,tabSize:2});
          editor.on('paste', function(cm, event) {
              var items = (event.clipboardData || event.originalEvent.clipboardData).items;
              for (var index in items) {
                  var item = items[index];
                  if (item.kind === 'file' && item.type.includes('image/')) {
                      event.preventDefault();
                      var blob = item.getAsFile();
                      var formData = new FormData();
                      formData.append('image', blob, blob.name);

                      var placeholder = "![图片上传中...]()";
                      var doc = cm.getDoc();
                      var cursor = doc.getCursor();
                      doc.replaceRange(placeholder, cursor);

                      fetch('/api/upload', {method: 'POST', body: formData})
                      .then(res => res.json())
                      .then(data => {
                          var content = doc.getValue();
                          if(data.url) {
                              doc.setValue(content.replace(placeholder, `![image](${data.url})`));
                              toast('图片上传成功！');
                          } else {
                              doc.setValue(content.replace(placeholder, ""));
                              toast(data.error || '上传失败', 'error');
                          }
                      }).catch(() => {
                          doc.setValue(doc.getValue().replace(placeholder, ""));
                          toast('上传失败，请检查网络', 'error');
                      });
                  }
              }
          });
      } else {
          toast("编辑器加载失败，请刷新重试", "error");
      }
  } catch(e) {}

  loadTree().catch(e => console.error(e));
  fetchCoursesForDatalist().catch(e => console.error(e));
  document.addEventListener('keydown', e=>{if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();if(currentFile)saveNote();}});
});

function toast(msg,type='success'){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+type;setTimeout(()=>el.className='toast',2500);}

async function fetchCoursesForDatalist() {
    const res = await fetch('/api/courses');
    const data = await res.json();
    allKnownFolders = data.all_folders || {};
    const datalist = document.getElementById('existing-courses');
    if(!datalist) return;
    datalist.innerHTML = '';
    for(const [folder, name] of Object.entries(allKnownFolders)) {
        if(folder !== 'output') {
            const option = document.createElement('option');
            option.value = folder;
            option.text = `📚 ${name} (${folder})`;
            datalist.appendChild(option);
        }
    }
}

// --- 智能分流 Modal 逻辑 ---
function toggleModalFields() {
    const mainCat = document.getElementById('new-main-cat').value;
    const lblSub = document.getElementById('lbl-subfolder');
    const pdfCheckContainer = document.getElementById('pdf-check-container');
    
    if (mainCat === 'courses') {
        lblSub.innerHTML = '3. 所属课程 (英文缩写) <span class="hint">生成文件夹</span>';
        pdfCheckContainer.style.display = 'flex';
    } else {
        lblSub.innerHTML = '3. 子分类名 (英文缩写) <span class="hint">如 latex / visa，用于生成文件夹</span>';
        pdfCheckContainer.style.display = 'none'; // 非课程隐藏PDF选项
        document.getElementById('new-has-pdf').checked = false;
    }
}

function openModal() { 
    document.getElementById('modal-new').style.display = 'flex'; 
    toggleModalFields();
    setTimeout(() => document.getElementById('new-title').focus(), 100);
}

function closeModal() { 
    document.getElementById('modal-new').style.display = 'none'; 
    ['new-title', 'new-folder', 'new-filename', 'new-permalink'].forEach(id => {
        let el = document.getElementById(id);
        if(el) el.value = '';
    });
    document.getElementById('new-main-cat').value = 'courses';
    document.getElementById('new-has-pdf').checked = false;
}

function autoGenLinks() {
    const mainCat = document.getElementById('new-main-cat').value;
    const folder = document.getElementById('new-folder').value.trim();
    const filename = document.getElementById('new-filename').value.trim();
    const permalinkInput = document.getElementById('new-permalink');
    
    // 动态路由前缀
    let routePrefix = '';
    if (mainCat === 'courses') routePrefix = 'notes';
    else if (mainCat === 'research') routePrefix = 'research';
    else if (mainCat === 'life') routePrefix = 'life';
    else if (mainCat === 'essays') routePrefix = 'essays';
    
    if(folder && filename) {
        permalinkInput.value = `/${routePrefix}/${folder}/${filename}`;
    } else {
        permalinkInput.value = '';
    }
}

async function createNewNote() {
    const main_cat_id = document.getElementById('new-main-cat').value;
    const title = document.getElementById('new-title').value.trim();
    const folder = document.getElementById('new-folder').value.trim();
    const filename = document.getElementById('new-filename').value.trim();
    const permalink = document.getElementById('new-permalink').value.trim();
    const hasPdf = document.getElementById('new-has-pdf').checked;
    
    if(!folder || !filename) return toast('文件夹和文件名不能为空', 'error');
    
    let pdf_url = "";
    if(hasPdf && permalink && main_cat_id === 'courses') {
        pdf_url = permalink.replace('/notes/', '/files/') + ".pdf";
    }
    
    const res = await fetch('/api/note/new', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({main_cat_id, sub_folder: folder, filename, title, permalink, pdf_url})
    });
    const data = await res.json();
    if(data.ok) {
        closeModal();
        toast('创建成功！');
        await loadTree();
        fetchCoursesForDatalist(); 
        selectFile(data.path, null);
    } else {
        toast(data.error || '创建失败', 'error');
    }
}

async function renameFile() {
    if(!currentFile) return;
    const parts = currentFile.split(/[/\\]/);
    const oldName = parts[parts.length-1];
    const newName = prompt("请输入新的文件名 (不改变 Permalink)：", oldName.replace('.md', ''));
    if(!newName || newName === oldName.replace('.md', '')) return;
    const res = await fetch('/api/note/rename', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({old_path: currentFile, new_name: newName})});
    const data = await res.json();
    if(data.ok) { toast('重命名成功！'); await loadTree(); selectFile(data.new_path, null); } 
    else { toast(data.error || '重命名失败', 'error'); }
}

async function deleteFile() {
    if(!currentFile) return;
    const parts = currentFile.split(/[/\\]/);
    const filename = parts[parts.length-1];
    if(!confirm(`⚠️ 危险操作！\n\n确定要彻底删除文件 "${filename}" 吗？`)) return;
    const res = await fetch('/api/note/delete', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({path: currentFile})});
    const data = await res.json();
    if(data.ok) {
        toast('文件已删除'); currentFile = null;
        document.getElementById('editor-content').style.display='none';
        document.getElementById('empty-state').style.display='flex';
        await loadTree(); fetchCoursesForDatalist(); 
    } else { toast(data.error || '删除失败', 'error'); }
}

function syncPdfUrl() {
    const permalink = document.getElementById('f-permalink').value.trim();
    if(!permalink) return toast('请先填写 permalink', 'error');
    let pdf = permalink;
    if(pdf.startsWith('/notes/')) pdf = pdf.replace('/notes/', '/files/');
    if(!pdf.endsWith('.pdf') && !pdf.endsWith('.docx')) pdf += '.pdf';
    document.getElementById('f-pdf_url').value = pdf;
    toast('已自动生成文件路径');
}

function switchTab(name){
  if(currentFile&&hasUnsavedNoteChanges()){if(!confirm('当前文章有未保存的修改，切换将丢弃更改。继续？'))return;}
  if(hasUnsavedCourseChanges()){if(!confirm('课程排序有未保存的修改，切换将丢弃更改。继续？'))return;}
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
  if(name==='courses')loadCourses();
}

// --- 渲染四宫格结构树 ---
async function loadTree(){
  try {
      const res = await fetch('/api/notes');
      if(!res.ok) throw new Error("API 请求失败");
      const data = await res.json();
      
      const tree = document.getElementById('file-tree');
      tree.innerHTML = '';
      
      const iconMap = {"courses": "🎒", "research": "🔬", "life": "☕", "essays": "✒️"};
      
      data.tree.forEach(mainNode => {
        // 第一级：四大类 (Main Category)
        const mainDiv = document.createElement('div');
        const mainHdr = document.createElement('div'); mainHdr.className = 'main-cat-item';
        const icon = iconMap[mainNode.main_id] || "📁";
        mainHdr.innerHTML = `<span class="arrow open">▶</span> ${icon} ${mainNode.main_name}`;
        
        const mainCh = document.createElement('div'); mainCh.className = 'main-children open';
        mainHdr.onclick = () => { mainCh.classList.toggle('open'); mainHdr.querySelector('.arrow').classList.toggle('open'); };
        
        let hasCurrentInMain = false;
        
        // 第二级：子分类 (Sub Category / Course)
        mainNode.subfolders.forEach(subNode => {
            const subDiv = document.createElement('div');
            const subHdr = document.createElement('div'); subHdr.className = 'folder-item';
            subHdr.innerHTML = `<span class="arrow">▶</span> 📂 ${subNode.sub_name}`;
            
            const subCh = document.createElement('div'); subCh.className = 'folder-children';
            subHdr.onclick = () => { subCh.classList.toggle('open'); subHdr.querySelector('.arrow').classList.toggle('open'); };
            
            let hasCurrentInSub = false;
            
            // 第三级：文件 (Files)
            subNode.files.forEach(f => {
                const item = document.createElement('div'); item.className = 'file-item'; item.dataset.path = f.path;
                if (currentFile === f.path) { item.classList.add('selected'); hasCurrentInSub = true; hasCurrentInMain = true; }
                item.innerHTML = `<span style="font-size:.7rem;margin-right:.3rem">${f.published?'👁️':'🚫'}</span>${f.title||f.path}`;
                item.onclick = e => { e.stopPropagation(); selectFile(f.path, item); };
                subCh.appendChild(item);
            });
            
            if(hasCurrentInSub) { subCh.classList.add('open'); subHdr.querySelector('.arrow').classList.add('open'); }
            subDiv.appendChild(subHdr); subDiv.appendChild(subCh);
            mainCh.appendChild(subDiv);
        });
        
        if(!hasCurrentInMain && mainNode.main_id !== 'courses') { 
            // 默认收起非课程分类，除非里面有当前选中的文件
            mainCh.classList.remove('open'); mainHdr.querySelector('.arrow').classList.remove('open'); 
        }
        mainDiv.appendChild(mainHdr); mainDiv.appendChild(mainCh);
        tree.appendChild(mainDiv);
      });
  } catch (err) {
      console.error(err);
  }
}

async function selectFile(path, el){
  if(currentFile===path)return;
  if(currentFile&&hasUnsavedNoteChanges()){if(!confirm('当前文章有未保存的修改，切换将丢弃更改。继续？'))return;}
  
  if(el) {
      document.querySelectorAll('.file-item').forEach(i=>i.classList.remove('selected'));
      el.classList.add('selected');
  } else {
      setTimeout(()=>{
          document.querySelectorAll('.file-item').forEach(i=>i.classList.remove('selected'));
          const newEl = document.querySelector(`.file-item[data-path="${path.replace(/\\/g, '\\\\')}"]`);
          if(newEl) newEl.classList.add('selected');
      }, 500);
  }
  
  try {
      const res=await fetch(`/api/note?path=${encodeURIComponent(path)}`);
      const data=await res.json();
      if(data.error){toast(data.error,'error');return;}
      
      currentFile=path;
      document.getElementById('empty-state').style.display='none';
      document.getElementById('editor-content').style.display='flex';
      
      const parts = path.split(/[/\\]/); 
      document.getElementById('current-filename').textContent = parts[parts.length-2] + "/" + parts[parts.length-1];
      
      ['title','main_category','sub_category','published','discipline','course','material_type','date','author','permalink','pdf_url'].forEach(f=>{
        const elem=document.getElementById(`f-${f}`);if(elem)elem.value=data.info[f]||'';
      });
      
      if(editor) { editor.setValue(data.body||''); editor.refresh(); }
      cleanInfo={...data.info};cleanBody=data.body||'';
  } catch (e) {
      toast("读取文件失败", "error");
  }
}

function hasUnsavedNoteChanges(){
  if(!currentFile)return false;
  for(const f of ['title','main_category','sub_category','published','discipline','course','material_type','date','author','permalink','pdf_url']){
    const el=document.getElementById(`f-${f}`);if(el&&el.value!==(cleanInfo[f]||''))return true;
  }
  if(editor&&editor.getValue().trim()!==cleanBody.trim())return true;
  return false;
}

async function saveNote(){
  if(!currentFile)return;
  const info={};
  ['title','main_category','sub_category','published','discipline','course','material_type','date','author','permalink','pdf_url'].forEach(f=>{info[f]=document.getElementById(`f-${f}`).value;});
  const body= editor ? editor.getValue() : cleanBody;
  
  try {
      const res=await fetch('/api/note',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:currentFile,info,body})});
      const data=await res.json();
      if(data.ok){cleanInfo={...info};cleanBody=body;toast('保存成功！');loadTree();}
      else toast(data.error || '保存失败','error');
  } catch(e) {
      toast('保存异常，请检查网络', 'error');
  }
}

async function loadCourses(){
  const res=await fetch('/api/courses');const data=await res.json();
  const container=document.getElementById('disc-list');container.innerHTML='';
  const groups={};
  data.courses.forEach(c=>{const d=c.discipline||'未分类';if(!groups[d])groups[d]=[];groups[d].push(c);});

  for(const[disc,courses]of Object.entries(groups)){
    const group=document.createElement('div');group.className='disc-group';group.dataset.discipline=disc;
    const header=document.createElement('div');header.className='disc-header';
    header.innerHTML=`<span class="disc-arrow">▶</span><span class="disc-label">${disc}</span><span class="disc-count">${courses.length} 门课</span>`;

    const body=document.createElement('div');body.className='disc-body';

    header.querySelector('.disc-arrow').addEventListener('click',e=>{e.stopPropagation();body.classList.toggle('open');header.querySelector('.disc-arrow').classList.toggle('open');});
    header.querySelector('.disc-label').addEventListener('click',e=>{e.stopPropagation();body.classList.toggle('open');header.querySelector('.disc-arrow').classList.toggle('open');});

    courses.forEach(c=>{
      const item=document.createElement('div');item.className='course-item';item.dataset.folder=c.folder;
      item.innerHTML=`<span class="course-name">${c.name}</span><span class="course-folder">${c.folder}</span>`;
      body.appendChild(item);
    });
    group.appendChild(header);group.appendChild(body);container.appendChild(group);
    if(typeof Sortable !== 'undefined') Sortable.create(body,{animation:150,ghostClass:'sortable-ghost',group:'courses'});
  }
  if(typeof Sortable !== 'undefined') Sortable.create(container,{animation:200,handle:'.disc-header',ghostClass:'sortable-ghost'});
  initialSnap=getSnap();
}

function getSnap(){ return Array.from(document.querySelectorAll('#disc-list .course-item')).map(li=>li.dataset.folder).join(','); }
function hasUnsavedCourseChanges(){ if(!initialSnap)return false; return getSnap()!==initialSnap; }

async function scanCourses(){
  const res=await fetch('/api/courses');const data=await res.json();
  const existing=new Set(data.courses.map(c=>c.folder));
  let n=0;for(const f of Object.keys(data.all_folders)){if(!existing.has(f)&&f!=='output')n++;}
  if(n>0){await loadCourses();toast(`已导入 ${n} 门新课程`);}
  else toast('没有新课程可导入');
}

async function saveCourses(){
  const folders=Array.from(document.querySelectorAll('#disc-list .course-item')).map(li=>li.dataset.folder);
  const res=await fetch('/api/courses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({folders})});
  const data=await res.json();
  if(data.ok){initialSnap=getSnap();toast('排序已保存！');}
  else toast('保存失败','error');
}

window.addEventListener('beforeunload',e=>{if(hasUnsavedNoteChanges()||hasUnsavedCourseChanges()){e.preventDefault();e.returnValue='';}});
</script>
