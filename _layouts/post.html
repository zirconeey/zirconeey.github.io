---
layout: default
---

<nav id="toc-container">
  <h4>目录 Index</h4>
  <ul id="toc-ul"></ul>
</nav>

<button id="toc-toggle" onclick="toggleTOC()" title="显示/隐藏目录">☰</button>

<article class="post-container" style="max-width: 800px; margin: 0 auto; position: relative;">
  
  <header class="post-header" style="margin-bottom: 3rem; text-align: center;">
    <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem; color: var(--color-ink);">
      {{ page.title | replace: 'LaTeX', 'L<span class="latex-a">a</span>T<span class="latex-e">e</span>X' }}
    </h1>
    <p class="post-meta" style="color: var(--color-light); font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic;">
      {{ page.date | date: "%B %d, %Y" }}
    </p>
  </header>

  <div class="markdown-content" id="post-content">
    {{ content }}
  </div>

  <div style="margin-top: 4rem; text-align: center;">
    <a href="{{ site.baseurl }}/" style="color: var(--color-muted); font-size: 0.95rem; text-decoration: none;">← 返回首页</a>
  </div>

</article>

<script>
  // 自动生成目录逻辑
  document.addEventListener("DOMContentLoaded", function() {
    const postContent = document.getElementById('post-content');
    const tocUl = document.getElementById('toc-ul');
    const headings = postContent.querySelectorAll('h1, h2');
    
    if (headings.length === 0) {
      document.getElementById('toc-toggle').style.display = 'none';
      return;
    }

    headings.forEach((heading, index) => {
      const id = 'heading-' + index;
      heading.setAttribute('id', id);

      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = heading.textContent;
      
      if (heading.tagName === 'H2') {
        a.classList.add('toc-h2');
      }
      
      li.appendChild(a);
      tocUl.appendChild(li);

      // 点击后的交互逻辑
      a.addEventListener('click', (e) => {
        // 在手机端，点击后自动收起侧栏，防止遮挡内容
        if (window.innerWidth <= 768) {
          toggleTOC();
        }
      });
    });
  });

  // 侧边栏开关逻辑
  function toggleTOC() {
    const toc = document.getElementById('toc-container');
    const btn = document.getElementById('toc-toggle');
    toc.classList.toggle('open');
    // 切换按钮的文字/图标
    btn.innerHTML = toc.classList.contains('open') ? '&times;' : '&#9776;';
  }
</script>
