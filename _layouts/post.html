---
layout: default
---

<nav id="toc-container">
  <h4 style="margin-bottom: 1.2rem; line-height: 1.4;">
    <a href="#" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); if(window.innerWidth <= 768) toggleTOC(event); return false;" 
       style="font-family: var(--font-display); font-size: 1.05rem; color: var(--color-ink); text-decoration: none; font-weight: 600; display: block; transition: color 0.2s;"
       onmouseover="this.style.color='var(--color-accent)'" 
       onmouseout="this.style.color='var(--color-ink)'">
      {{ page.title | replace: 'LaTeX', 'L<span class="latex-a">a</span>T<span class="latex-e">e</span>X' }}
    </a>
  </h4>
  <ul id="toc-ul"></ul>
</nav>

<button id="toc-toggle" onclick="toggleTOC(event)" title="Toggle Index">☰</button>

<article class="post-container" style="max-width: 800px; margin: 0 auto;">
  <header class="post-header" style="margin-bottom: 3.5rem; text-align: center;">
    <h1 style="font-size: 2.3rem; color: var(--color-ink); line-height: 1.3;">
      {{ page.title | replace: 'LaTeX', 'L<span class="latex-a">a</span>T<span class="latex-e">e</span>X' }}
    </h1>
    
    <div style="display: flex; justify-content: space-between; align-items: center; color: var(--color-light); font-family: 'Cormorant Garamond', serif; margin-top: 2rem; padding-bottom: 1rem; border-bottom: 1px dashed var(--color-border);">
      
      <span style="font-size: 1.1rem;">{{ page.date | date: "%B %d, %Y" }}</span>

      <span style="font-size: 1.1rem; font-style: italic; letter-spacing: 0.05rem;">
        By {{ page.author | default: "Zircon" }}
      </span>

      <div style="display: flex; gap: 1.2rem; align-items: center; font-family: var(--font-body); font-size: 0.95rem; opacity: 0.85;">
        
        <div style="display: flex; align-items: center; gap: 0.4rem;" title="阅读量">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <span class="waline-pageview-count" data-path="{{ page.url }}">...</span>
        </div>

        <div style="display: flex; align-items: center; gap: 0.4rem;" title="评论数">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <span class="waline-comment-count" data-path="{{ page.url }}">...</span>
        </div>

      </div>
    </div>
  </header>

  <div class="markdown-content" id="post-content">
    {{ content }}
  </div>

<style>
  /* 隐藏 Waline 默认的 Markdown 语法指引图标 */
  .wl-actions a { display: none !important; }
  .wl-editor, .wl-input, .wl-btn { font-family: inherit !important; }

  /* 隐藏 Waline 头像及徽章容器 */
  #waline .wl-avatar,
  #waline img.wl-avatar,
  #waline .wl-badge-wrap {
    display: none !important;
  }
  
  /* 强行接管右侧评论面板的排版 */
  #waline .wl-panel {
    margin-left: 0 !important;
    padding-left: 0 !important;
    width: 100% !important;
  }
  
  /* 去除输入框旁边留给头像的空白 */
  #waline .wl-header {
    margin-left: 0 !important;
  }

  /* 🚀 新增：移动端彻底隐藏 PDF 预览框，只保留下载按钮 */
  @media (max-width: 768px) {
    .pdf-container iframe {
      display: none !important;
    }
  }
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

<div id="waline" style="margin-top: 5rem; padding-top: 2rem; border-top: 1px dashed var(--color-border);"></div>

<script type="module">
  import { init } from 'https://unpkg.com/@waline/client@v2/dist/waline.mjs';

  // 动态注入样式以覆盖 Waline 异步加载后的样式
  const forceStyle = document.createElement('style');
  forceStyle.innerHTML = `
    .wl-actions a { display: none !important; }
    .wl-editor, .wl-input, .wl-btn { font-family: inherit !important; }
    #waline .wl-user { display: none !important; }
    #waline .wl-panel { margin-left: 0 !important; width: 100% !important; }
  `;
  document.head.appendChild(forceStyle);

  {% if page.reactions %}
    const customReactions = {{ page.reactions | jsonify }};
    const reactionConfig = customReactions.map(emoji => 
      `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E${emoji}%3C/text%3E%3C/svg%3E`
    );
  {% else %}
    const reactionConfig = [
      'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f44d.png', 
      'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f44e.png'  
    ];
  {% endif %}

  init({
    el: '#waline',
    serverURL: 'https://zircon-comments.vercel.app', 
    dark: 'auto', 
    lang: 'zh-CN', 
    emoji: ['//unpkg.com/@waline/emojis@1.1.0/tieba'],
    placeholder: '欢迎交流！不填昵称也可以直接发布哦...',
    pageview: true, 
    comment: true,  
    texRenderer: (blockMode, tex) => {
      if (window.katex) {
        return window.katex.renderToString(tex, { displayMode: blockMode, throwOnError: false });
      }
      return tex;
    },
    highlighter: (code) => code, 
    locale: {
      reactionTitle: '', 
      preview: '👀 开启 Markdown 预览',
      anonymous: '神秘学者' 
    },
    reaction: reactionConfig, 
    requiredMeta: [], 
  });

  // 🚀 全局公式渲染（绝对原封不动）
  setTimeout(() => {
    if (window.renderMathInElement) {
      window.renderMathInElement(document.body, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '\\[', right: '\\]', display: true},
          {left: '$', right: '$', display: false},
          {left: '\\(', right: '\\)', display: false}
        ],
        throwOnError: false
      });
    }
  }, 800); 
</script>

<div style="margin-top: 4rem; text-align: center;">
  <a href="{{ site.baseurl }}/" style="color: var(--color-muted); text-decoration: none;">← 返回首页</a>
</div>

</article>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const postContent = document.getElementById('post-content');
    const tocUl = document.getElementById('toc-ul');
    const headings = postContent.querySelectorAll('h1, h2');
    
    if (headings.length === 0) {
      document.getElementById('toc-toggle').style.display = 'none';
      return;
    }

    headings.forEach((heading, index) => {
      const id = 'section-' + index;
      heading.setAttribute('id', id);

      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = heading.textContent;
      
      if (heading.tagName === 'H2') {
        a.classList.add('toc-h2');
      }
      
      li.appendChild(a);
      tocUl.appendChild(li);

      a.addEventListener('click', () => {
        if (window.innerWidth <= 768) toggleTOC();
      });
    });
  });

  // 核心改动：点击目录和按钮以外的区域，自动收回目录
  document.addEventListener('click', function(event) {
    const toc = document.getElementById('toc-container');
    const btn = document.getElementById('toc-toggle');
    
    // 如果目录是打开状态，且点击的既不是目录内部，也不是开关按钮本身
    if (toc.classList.contains('open') && !toc.contains(event.target) && !btn.contains(event.target)) {
      if (window.innerWidth <= 768) {
        toggleTOC();
      }
    }
  });

  function toggleTOC(event) {
    if (event) event.stopPropagation(); // 阻止事件冒泡，防止触发 document 的点击监听
    const toc = document.getElementById('toc-container');
    const btn = document.getElementById('toc-toggle');
    toc.classList.toggle('open');
    btn.innerHTML = toc.classList.contains('open') ? '&times;' : '&#9776;';
  }
</script>
