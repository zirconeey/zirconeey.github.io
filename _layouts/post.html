---
layout: default
---
<article class="post">
  <header style="margin-bottom: 2rem;">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">发布于 {{ page.date | date: "%Y年%m月%d日" }}</time>
      {% if page.categories %}
        · 归档在: {{ page.categories | join: ", " }}
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
  
  <div style="margin-top: 4rem; text-align: center;">
    <a href="{{ site.baseurl }}/" style="font-size: 0.9rem;">← 返回存档主页</a>
  </div>
</article>
