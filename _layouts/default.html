<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  
  <style>
    /* 继承你的色彩变量 */
    :root {
      --color-ink: #1a1a2e;
      --color-text: #374151;
      --color-muted: #6b7280;
      --color-light: #9ca3af;
      --color-border: #e5e7eb;
      --color-bg: #fafaf9;
      --color-bg-warm: #f5f4f0;
      --color-accent: #1e3a5f;
      --color-accent-light: #2d5a8e;
      --color-highlight: #c9a96e;
      --color-card: #ffffff;
      --color-nav-bg: rgba(250,250,249,0.92);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Source Sans 3', -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      --max-width: 800px; /* 博客阅读宽度设窄一点更舒服 */
    }

    /* 暗黑模式 */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --color-ink: #e8e6e3; --color-text: #b8b5b0; --color-muted: #8a8680;
        --color-border: #2e2c2a; --color-bg: #1a1918; --color-bg-warm: #222120;
        --color-accent: #7aaddb; --color-accent-light: #9dc4e8;
        --color-card: #232221; --color-nav-bg: rgba(26,25,24,0.92);
      }
    }
    :root[data-theme="dark"] {
      --color-ink: #e8e6e3; --color-text: #b8b5b0; --color-muted: #8a8680;
      --color-border: #2e2c2a; --color-bg: #1a1918; --color-bg-warm: #222120;
      --color-accent: #7aaddb; --color-accent-light: #9dc4e8;
      --color-card: #232221; --color-nav-bg: rgba(26,25,24,0.92);
    }
    :root[data-theme="light"] {
      --color-ink: #1a1a2e; --color-text: #374151; --color-muted: #6b7280;
      --color-border: #e5e7eb; --color-bg: #fafaf9; --color-bg-warm: #f5f4f0;
      --color-accent: #1e3a5f; --color-accent-light: #2d5a8e;
      --color-card: #ffffff; --color-nav-bg: rgba(250,250,249,0.92);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); color: var(--color-text); background: var(--color-bg); line-height: 1.8; font-size: 17px; }
    
    /* 强化的超链接样式 */
    a { 
      color: var(--color-accent); 
      text-decoration: underline; 
      text-decoration-color: rgba(30, 58, 95, 0.3);
      text-underline-offset: 3px;
      transition: all 0.2s;
    }
    a:hover { color: var(--color-accent-light); text-decoration-color: var(--color-accent-light); }
    
    /* 导航栏 */
    nav { position: fixed; top: 0; width: 100%; z-index: 100; background: var(--color-nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--color-border); }
    .nav-inner { max-width: 960px; margin: 0 auto; padding: 0.85rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    
    /* 导航栏里的链接去掉下划线 */
    .nav-inner a { text-decoration: none; }
    .nav-back { font-family: var(--font-body); font-size: 0.95rem; font-weight: 500; color: var(--color-accent); display: flex; align-items: center; gap: 0.4rem; }
    .nav-back:hover { color: var(--color-accent-light); }
    
    .theme-toggle { background: none; border: 1px solid var(--color-border); cursor: pointer; padding: 0.35rem 0.5rem; border-radius: 4px; font-size: 0.9rem; color: var(--color-muted); }

    /* 主体内容区 */
    main { max-width: var(--max-width); margin: 6rem auto 4rem; padding: 0 2rem; }
    h1, h2, h3 { font-family: var(--font-display); color: var(--color-ink); font-weight: 600; margin-bottom: 1rem; }
    h1 { font-size: 2.5rem; }
    h2 { font-size: 1.8rem; margin-top: 2.5rem; border-bottom: 1px solid var(--color-border); padding-bottom: 0.5rem; }
    
    /* 警告/说明框 (用于笔记不维护的声明) */
    .notice-box { background: var(--color-bg-warm); border-left: 4px solid var(--color-highlight); padding: 1rem 1.5rem; margin: 1.5rem 0; border-radius: 0 4px 4px 0; font-size: 0.95rem; }
    
    /* 博客列表 */
    .post-list { list-style: none; margin-top: 1.5rem; }
    .post-item { margin-bottom: 1.5rem; }
    .post-meta { font-size: 0.85rem; color: var(--color-light); margin-bottom: 0.3rem; }
    .post-title { font-size: 1.25rem; font-family: var(--font-display); font-weight: 600; }
    .post-title a { text-decoration: none; color: var(--color-ink); }
    .post-title a:hover { color: var(--color-accent); text-decoration: underline; }

    footer { max-width: var(--max-width); margin: 0 auto; padding: 2rem; text-align: center; font-size: 0.85rem; color: var(--color-light); border-top: 1px solid var(--color-border); }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="https://ruizhou03.github.io" class="nav-back">← 返回英文学术主页 (Rui's Homepage)</a>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">&#9790;</button>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    &copy; {{ site.time | date: "%Y" }} Rui Zhou. 这是一个静态存档站点。
  </footer>

  <script>
    function toggleTheme() {
      const root = document.documentElement;
      const current = root.getAttribute('data-theme');
      const btn = document.querySelector('.theme-toggle');
      if (!current) { root.setAttribute('data-theme', 'dark'); btn.innerHTML = '&#9790;'; }
      else if (current === 'dark') { root.setAttribute('data-theme', 'light'); btn.innerHTML = '&#9728;'; }
      else { root.removeAttribute('data-theme'); btn.innerHTML = '&#9683;'; }
    }
    (function() { document.querySelector('.theme-toggle').innerHTML = '&#9683;'; })();
  </script>
</body>
</html>
