<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#fff4c8"/>
      <stop offset="55%" stop-color="#c8681c"/>
      <stop offset="100%" stop-color="#3a0e02"/>
    </radialGradient>
    <radialGradient id="yolk" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffdc60"/>
      <stop offset="85%" stop-color="#e88818"/>
      <stop offset="100%" stop-color="#a85008"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- bowl with rice and meat -->
  <ellipse cx="400" cy="440" rx="280" ry="30" fill="#1a0502" opacity="0.4"/>
  <path d="M130,260 Q130,440 400,440 Q670,440 670,260 Z" fill="#f2e8d0" stroke="#6a4018" stroke-width="3"/>
  <!-- rice base (lighter top surface) -->
  <ellipse cx="400" cy="260" rx="270" ry="50" fill="#fbf6e0"/>
  <!-- ground meat layer (brown-red on top of rice) -->
  <ellipse cx="400" cy="255" rx="250" ry="38" fill="#6a3010"/>
  <!-- meat texture -->
  <g fill="#8a4818" opacity="0.85">
    <ellipse cx="260" cy="240" rx="12" ry="6"/>
    <ellipse cx="300" cy="250" rx="10" ry="5"/>
    <ellipse cx="340" cy="245" rx="11" ry="6"/>
    <ellipse cx="385" cy="242" rx="10" ry="5"/>
    <ellipse cx="470" cy="245" rx="12" ry="6"/>
    <ellipse cx="515" cy="248" rx="10" ry="5"/>
    <ellipse cx="550" cy="244" rx="11" ry="6"/>
    <ellipse cx="280" cy="270" rx="10" ry="5"/>
    <ellipse cx="340" cy="275" rx="11" ry="5"/>
    <ellipse cx="480" cy="272" rx="11" ry="5"/>
    <ellipse cx="530" cy="270" rx="10" ry="5"/>
  </g>
  <!-- three sunny eggs -->
  <g>
    <!-- egg 1 -->
    <ellipse cx="290" cy="258" rx="55" ry="22" fill="#fbf4e0" stroke="#c08840" stroke-width="1.5"/>
    <circle cx="290" cy="255" r="18" fill="url(#yolk)" stroke="#8a5010" stroke-width="1"/>
    <!-- egg 2 -->
    <ellipse cx="410" cy="255" rx="58" ry="22" fill="#fbf4e0" stroke="#c08840" stroke-width="1.5"/>
    <circle cx="410" cy="252" r="19" fill="url(#yolk)" stroke="#8a5010" stroke-width="1"/>
    <!-- egg 3 -->
    <ellipse cx="520" cy="258" rx="55" ry="22" fill="#fbf4e0" stroke="#c08840" stroke-width="1.5"/>
    <circle cx="520" cy="255" r="18" fill="url(#yolk)" stroke="#8a5010" stroke-width="1"/>
  </g>
  <!-- yolk highlights -->
  <g fill="#fff0a0" opacity="0.7">
    <ellipse cx="285" cy="250" rx="5" ry="3"/>
    <ellipse cx="405" cy="247" rx="6" ry="3"/>
    <ellipse cx="515" cy="250" rx="5" ry="3"/>
  </g>
  <!-- scallion -->
  <g fill="#68a03a">
    <ellipse cx="350" cy="240" rx="8" ry="1.5"/>
    <ellipse cx="470" cy="245" rx="8" ry="1.5"/>
    <ellipse cx="360" cy="280" rx="8" ry="1.5"/>
  </g>
  <text x="400" y="555" font-family="'Noto Serif SC', serif" font-size="36" font-weight="700"
        fill="#2a0704" text-anchor="middle" letter-spacing="5">酱 香 太 阳 肉 盖 饭</text>
</svg>
