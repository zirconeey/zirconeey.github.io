<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#fff4d2"/>
      <stop offset="55%" stop-color="#c08040"/>
      <stop offset="100%" stop-color="#3a1a08"/>
    </radialGradient>
    <radialGradient id="yolk" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffcc33"/>
      <stop offset="85%" stop-color="#e08810"/>
      <stop offset="100%" stop-color="#a85a10"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- bowl shadow -->
  <ellipse cx="400" cy="430" rx="270" ry="30" fill="#1a0602" opacity="0.4"/>
  <!-- bowl outer -->
  <path d="M140,250 Q140,430 400,430 Q660,430 660,250 Z" fill="#e8dcc0" stroke="#7a5a28" stroke-width="3"/>
  <!-- bowl rim -->
  <ellipse cx="400" cy="250" rx="260" ry="45" fill="#f2e8ce"/>
  <!-- soy sauce surface -->
  <ellipse cx="400" cy="250" rx="235" ry="38" fill="#5a2a0e"/>
  <!-- egg whites (3 visible tops) -->
  <ellipse cx="330" cy="245" rx="55" ry="22" fill="#f8f0d8" opacity="0.85"/>
  <ellipse cx="445" cy="255" rx="55" ry="22" fill="#f8f0d8" opacity="0.85"/>
  <ellipse cx="535" cy="240" rx="50" ry="20" fill="#f8f0d8" opacity="0.85"/>
  <!-- yolks -->
  <ellipse cx="330" cy="243" rx="22" ry="10" fill="url(#yolk)"/>
  <ellipse cx="445" cy="253" rx="22" ry="10" fill="url(#yolk)"/>
  <ellipse cx="535" cy="238" rx="20" ry="9" fill="url(#yolk)"/>
  <!-- green onion flecks -->
  <g fill="#68a03a">
    <ellipse cx="270" cy="240" rx="4" ry="1.5"/>
    <ellipse cx="400" cy="230" rx="4" ry="1.5"/>
    <ellipse cx="490" cy="260" rx="4" ry="1.5"/>
    <ellipse cx="580" cy="255" rx="4" ry="1.5"/>
  </g>
  <text x="400" y="555" font-family="'Noto Serif SC', serif" font-size="40" font-weight="700"
        fill="#2a0c02" text-anchor="middle" letter-spacing="6">酱 油 蒸 蛋</text>
</svg>
