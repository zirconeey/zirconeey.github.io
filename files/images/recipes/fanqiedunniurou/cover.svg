<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#f8c098"/>
      <stop offset="55%" stop-color="#8a2810"/>
      <stop offset="100%" stop-color="#1a0402"/>
    </radialGradient>
    <radialGradient id="stew" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e83810"/>
      <stop offset="55%" stop-color="#a82008"/>
      <stop offset="100%" stop-color="#4a0a02"/>
    </radialGradient>
    <linearGradient id="beef" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a3018"/>
      <stop offset="100%" stop-color="#3a0e02"/>
    </linearGradient>
    <linearGradient id="onion" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8e0c0"/>
      <stop offset="100%" stop-color="#a87838"/>
    </linearGradient>
    <linearGradient id="pot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a2818"/>
      <stop offset="100%" stop-color="#1a0a02"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- casserole pot shadow -->
  <ellipse cx="400" cy="490" rx="310" ry="35" fill="#0a0402" opacity="0.4"/>
  <!-- pot handles -->
  <ellipse cx="115" cy="290" rx="28" ry="10" fill="url(#pot)"/>
  <ellipse cx="685" cy="290" rx="28" ry="10" fill="url(#pot)"/>
  <!-- pot rim -->
  <ellipse cx="400" cy="250" rx="300" ry="55" fill="url(#pot)"/>
  <!-- pot body -->
  <path d="M100,250 Q100,475 400,480 Q700,475 700,250 Z" fill="url(#pot)"/>
  <!-- stew surface -->
  <ellipse cx="400" cy="250" rx="285" ry="50" fill="url(#stew)"/>
  <!-- tomato chunk pieces -->
  <g fill="#c81008" opacity="0.9" stroke="#6a0402" stroke-width="1">
    <ellipse cx="220" cy="245" rx="15" ry="7" transform="rotate(10 220 245)"/>
    <ellipse cx="340" cy="260" rx="18" ry="8" transform="rotate(-15 340 260)"/>
    <ellipse cx="440" cy="240" rx="16" ry="7" transform="rotate(20 440 240)"/>
    <ellipse cx="560" cy="255" rx="17" ry="8" transform="rotate(-10 560 255)"/>
    <ellipse cx="300" cy="275" rx="14" ry="6" transform="rotate(5 300 275)"/>
    <ellipse cx="510" cy="270" rx="15" ry="7" transform="rotate(-20 510 270)"/>
  </g>
  <!-- beef chunks (3cm cubes) -->
  <g stroke="#1a0402" stroke-width="1.5" fill="url(#beef)">
    <rect x="240" y="225" width="38" height="32" rx="4" transform="rotate(-8 259 241)"/>
    <rect x="370" y="218" width="40" height="34" rx="4" transform="rotate(6 390 235)"/>
    <rect x="475" y="222" width="38" height="33" rx="4" transform="rotate(-5 494 238)"/>
    <rect x="570" y="228" width="36" height="30" rx="4" transform="rotate(10 588 243)"/>
    <rect x="195" y="265" width="40" height="34" rx="4" transform="rotate(4 215 282)"/>
    <rect x="315" y="272" width="38" height="32" rx="4" transform="rotate(-10 334 288)"/>
    <rect x="425" y="268" width="40" height="34" rx="4" transform="rotate(7 445 285)"/>
    <rect x="530" y="280" width="38" height="32" rx="4" transform="rotate(-6 549 296)"/>
  </g>
  <!-- beef marbling highlights -->
  <g fill="#c86838" opacity="0.5">
    <path d="M245,235 Q260,232 275,237" stroke="#c86838" stroke-width="1.5" fill="none"/>
    <path d="M378,228 Q395,225 408,230" stroke="#c86838" stroke-width="1.5" fill="none"/>
    <path d="M430,278 Q448,275 462,280" stroke="#c86838" stroke-width="1.5" fill="none"/>
    <path d="M200,275 Q215,272 230,278" stroke="#c86838" stroke-width="1.5" fill="none"/>
  </g>
  <!-- onion chunks (translucent) -->
  <g fill="url(#onion)" opacity="0.85" stroke="#6a3818" stroke-width="1">
    <path d="M155,260 Q185,255 215,265 L210,280 Q180,285 160,278 Z"/>
    <path d="M275,258 Q300,252 325,263 L320,278 Q298,283 278,275 Z"/>
    <path d="M460,260 Q490,255 515,265 L512,280 Q488,285 465,278 Z"/>
    <path d="M605,252 Q630,247 655,257 L652,272 Q628,277 608,270 Z"/>
  </g>
  <!-- oil shine -->
  <g fill="#f8a040" opacity="0.5">
    <ellipse cx="350" cy="240" rx="10" ry="3"/>
    <ellipse cx="460" cy="255" rx="12" ry="3"/>
    <ellipse cx="290" cy="252" rx="8" ry="2"/>
    <ellipse cx="540" cy="245" rx="10" ry="3"/>
  </g>
  <!-- scallion/parsley green scatter -->
  <g fill="#68a03a">
    <ellipse cx="300" cy="240" rx="8" ry="2" transform="rotate(15 300 240)"/>
    <ellipse cx="395" cy="245" rx="7" ry="2" transform="rotate(-20 395 245)"/>
    <ellipse cx="480" cy="232" rx="8" ry="2" transform="rotate(10 480 232)"/>
    <ellipse cx="370" cy="268" rx="7" ry="2" transform="rotate(-10 370 268)"/>
    <ellipse cx="555" cy="260" rx="8" ry="2" transform="rotate(20 555 260)"/>
  </g>
  <!-- star anise -->
  <g fill="#6a2008" stroke="#3a0e02" stroke-width="1">
    <g transform="translate(200,240)">
      <path d="M0,0 L-8,-3 L-6,-10 L0,-5 L6,-10 L8,-3 L6,5 L0,10 L-6,5 Z"/>
    </g>
  </g>
  <!-- steam -->
  <g stroke="#faf4e0" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round">
    <path d="M320,190 Q310,160 320,130 Q335,105 320,80"/>
    <path d="M400,185 Q390,155 405,125 Q420,95 405,65"/>
    <path d="M480,190 Q470,160 485,130 Q500,105 485,80"/>
  </g>
  <text x="400" y="555" font-family="'Noto Serif SC', serif" font-size="36" font-weight="700"
        fill="#1a0402" text-anchor="middle" letter-spacing="4">番 茄 炖 牛 肉</text>
</svg>
