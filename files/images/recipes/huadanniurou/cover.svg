<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#fff4d0"/>
      <stop offset="55%" stop-color="#e09530"/>
      <stop offset="100%" stop-color="#4e1e04"/>
    </radialGradient>
    <linearGradient id="egg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff1b0"/>
      <stop offset="100%" stop-color="#edb638"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- plate -->
  <ellipse cx="400" cy="360" rx="290" ry="65" fill="#2a140a" opacity="0.4"/>
  <ellipse cx="400" cy="350" rx="290" ry="65" fill="#f3e6ca"/>
