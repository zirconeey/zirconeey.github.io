name: Sync English site to ruizhou03 repo

# Mirrors en/index.html (frontmatter stripped) + files/en/** into
# ruizhou03/ruizhou03.github.io so that https://ruizhou03.github.io serves
# the English academic homepage without exposing the zirconeey URL.

on:
  push:
    branches: [main]
    paths:
      - 'en/**'
      - 'files/en/**'
      - '.github/workflows/sync-english-site.yml'
  workflow_dispatch:  # allow manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zirconeey source
        uses: actions/checkout@v4

      - name: Checkout ruizhou03 target
        uses: actions/checkout@v4
        with:
          repository: ruizhou03/ruizhou03.github.io
          path: target
          token: ${{ secrets.RUIZHOU03_PAT }}
          fetch-depth: 1

      - name: Strip Jekyll frontmatter from en/index.html
        run: |
          python3 - <<'PY'
          import re, pathlib
          src = pathlib.Path('en/index.html').read_text()
          stripped = re.sub(r'\A---\n.*?\n---\n', '', src, count=1, flags=re.DOTALL)
          pathlib.Path('target/index.html').write_text(stripped)
          PY

      - name: Mirror files/en assets
        run: |
          rm -rf target/files/en
          mkdir -p target/files
          cp -r files/en target/files/

      - name: Mirror sitemap.xml + robots.txt + verification files to ruizhou03 root
        # These live under en/ in the source repo (so ruizhou03 has no
        # hand-edited files), and get hoisted to / on the target repo
        # because that's where Google looks for them.
        # `google*.html` covers Google Search Console ownership-verification
        # files — drop new ones into en/ and they ship to root automatically.
        run: |
          cp en/sitemap.xml target/sitemap.xml
          cp en/robots.txt target/robots.txt
          for f in en/google*.html; do
            [ -e "$f" ] && cp "$f" "target/$(basename "$f")"
          done

      - name: Commit & push if changed
        working-directory: target
        run: |
          git config user.email "rzz5258@psu.edu"
          git config user.name "zirconeey sync bot"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "sync from zirconeey@${GITHUB_SHA::7} at $(date -u +%FT%TZ)"
            git push
          fi
